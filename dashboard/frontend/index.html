<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ai-os</title>

    <!-- PWA: makes the dashboard installable on iOS, Android, Mac, Windows,
         Linux via the browser ("Add to Home Screen" / "Install app"). No
         app-store, no APK. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Personal AI workspace — chat-driven, configures itself" />

    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS doesn't fully honor manifest icons; needs apple-touch-icon. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ai-os" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[pwa] sw registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
